<!DOCTYPE html>
<html>

<head>

<title>St Thomas Mount MRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.map-container{
position:relative;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.station-map{
width:100%;
}

.marker{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
display:none;
}

.block{
position:absolute;
width:40px;
height:40px;
cursor:pointer;
}

.icon{
position:absolute;
font-size:20px;
}

.controls{
margin-top:20px;
}

button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

select{
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h2>St Thomas Mount MRTS Station</h2>
<p>Station Code: STM</p>

</header>

<div class="container">

<div class="map-container">

<img src="../maps/stm-map.png" class="station-map">

<div id="marker" class="marker"></div>

<!-- clickable blocks -->

<div class="block" style="top:200px;left:150px;" onclick="selectBlock('A')"></div>
<div class="block" style="top:200px;left:420px;" onclick="selectBlock('B')"></div>
<div class="block" style="top:380px;left:150px;" onclick="selectBlock('C')"></div>
<div class="block" style="top:380px;left:420px;" onclick="selectBlock('D')"></div>

<!-- amenities -->

<div class="icon" style="top:210px;left:160px;">🚻</div>
<div class="icon" style="top:390px;left:160px;">🎫</div>
<div class="icon" style="top:210px;left:430px;">🛗</div>

<p id="location"></p>

</div>

<div class="controls">

<h3>Select Destination</h3>

<select id="destination">

<option>Platform</option>
<option>Parking</option>
<option>Ticket Counter</option>

</select>

<button onclick="navigate()">Navigate</button>

<p id="result"></p>

</div>

</div>

<script>

const blockPositions = {

A:{top:"200px",left:"150px"},
B:{top:"200px",left:"420px"},
C:{top:"380px",left:"150px"},
D:{top:"380px",left:"420px"}

}

function selectBlock(b){

document.getElementById("location").innerHTML=
"📍 Selected Block "+b

}

function navigate(){

let dest=document.getElementById("destination").value

document.getElementById("result").innerHTML=
"➡ Navigate to "+dest

}

const params=new URLSearchParams(window.location.search)

const block=params.get("block")

if(block){

document.getElementById("location").innerHTML=
"📍 You are at Block "+block

const marker=document.getElementById("marker")

marker.style.display="block"

marker.style.top=blockPositions[block].top
marker.style.left=blockPositions[block].left

}

</script>

</body>

</html>
