<!DOCTYPE html>
<html>

<head>

<title>Puzhuthivakkam MRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.map-container{
position:relative;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.station-map{
width:100%;
border-radius:10px;
}

.route-layer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.marker{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
display:none;
transform:translate(-50%,-50%);
border:2px solid white;
}

.recommended{
position:absolute;
width:30px;
height:30px;
border:3px solid lime;
border-radius:50%;
}

.amenity{
position:absolute;
font-size:22px;
cursor:pointer;
transform:translate(-50%,-50%);
}

.amenity:hover{
transform:translate(-50%,-50%) scale(1.2);
}

.tooltip{
position:absolute;
background:#000;
color:white;
padding:4px 8px;
border-radius:5px;
font-size:12px;
white-space:nowrap;
display:none;
transform:translate(-50%,-140%);
}

.location{
margin-top:10px;
font-weight:500;
background:#e8f3ff;
padding:8px;
border-radius:6px;
}

.controls{
margin-top:20px;
}

select{
padding:10px;
width:220px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}

button:hover{
background:#1e6fb9;
}

.result{
margin-top:15px;
font-weight:500;
}

.highlight{
transform:translate(-50%,-50%) scale(1.6);
background:yellow;
border-radius:50%;
padding:5px;
}

</style>

</head>

<body>

<header>

<h2>Puzhuthivakkam MRTS Station</h2>
<p>Station Code: PUVM</p>

</header>

<div class="container">

<div class="map-container" id="mapContainer">

<img src="../maps/puvm-map.png" class="station-map">

<svg id="routeLayer" class="route-layer"></svg>

<div id="marker" class="marker"></div>

<div class="recommended" style="top:360px; left:720px;"></div>
<div class="recommended" style="top:200px; left:260px;"></div>

<p id="location" class="location"></p>

</div>

<div class="controls">

<h3>Select Destination</h3>

<select id="destination">

<option value="Platform 1">Platform 1</option>
<option value="Platform 2">Platform 2</option>
<option value="Parking">Parking</option>
<option value="Ticket Counter">Ticket Counter</option>

</select>

<button onclick="navigate()">Navigate</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

/* ---------------- ROUTE DEFINITIONS ---------------- */

/* ---------------- WALKING NODES ---------------- */

const nodes = {

A:{x:150,y:200},
C:{x:160,y:380},

FOB1:{x:300,y:250},
FOB2:{x:300,y:340},

ticket:{x:720,y:360},
parking:{x:260,y:380},
toilet:{x:260,y:210}

}

/* ---------------- LANDMARKS ---------------- */

const landmarks = {

FOB1:"Foot Over Bridge",
FOB2:"Foot Over Bridge",
ticket:"Ticket Counter",
parking:"Parking Area",
toilet:"Toilet"

}

/* ---------------- WALKABLE CONNECTIONS ---------------- */

const edges = {

A:["FOB1"],
C:["FOB2"],

FOB1:["A","FOB2","ticket","toilet"],
FOB2:["FOB1","parking","C"],

ticket:["FOB1"],
toilet:["FOB1"],
parking:["FOB2"]

}

/* ---------------- DISTANCE ---------------- */

function distance(a,b){

let dx = nodes[a].x - nodes[b].x
let dy = nodes[a].y - nodes[b].y

return Math.sqrt(dx*dx + dy*dy)

}

/* ---------------- SHORTEST PATH ---------------- */

function shortestPath(start,end){

let dist={}
let prev={}
let queue=new Set(Object.keys(nodes))

Object.keys(nodes).forEach(n=>{
dist[n]=Infinity
})

dist[start]=0

while(queue.size){

let u=[...queue].reduce((a,b)=>dist[a]<dist[b]?a:b)

queue.delete(u)

if(u===end) break

edges[u].forEach(v=>{

let alt=dist[u]+distance(u,v)

if(alt<dist[v]){
dist[v]=alt
prev[v]=u
}

})

}

let path=[]
let u=end

while(u){
path.unshift(u)
u=prev[u]
}

return path

}

function pathToPoints(path){
return path.map(p=>nodes[p])
}

/* ---------------- DRAW ROUTE ---------------- */

function drawRoute(points){

const svg=document.getElementById("routeLayer")

svg.innerHTML=""

/* START POINT */

let start=document.createElementNS(
"http://www.w3.org/2000/svg",
"circle"
)

start.setAttribute("cx",points[0].x)
start.setAttribute("cy",points[0].y)
start.setAttribute("r","6")
start.setAttribute("fill","red")

svg.appendChild(start)

/* CREATE ROUTE LINE */

let polyline=document.createElementNS(
"http://www.w3.org/2000/svg",
"polyline"
)

let pathPoints=points.map(p=>p.x+","+p.y).join(" ")

polyline.setAttribute("points",pathPoints)
polyline.setAttribute("fill","none")
polyline.setAttribute("stroke","#007bff")
polyline.setAttribute("stroke-width","6")
polyline.setAttribute("stroke-linecap","round")
polyline.setAttribute("stroke-linejoin","round")

svg.appendChild(polyline)

/* ROUTE ANIMATION */

let length=polyline.getTotalLength()

polyline.style.strokeDasharray=length
polyline.style.strokeDashoffset=length

polyline.animate(
[
{strokeDashoffset:length},
{strokeDashoffset:0}
],
{
duration:1500,
easing:"ease-out",
fill:"forwards"
}
)

/* DESTINATION POINT */

let end=document.createElementNS(
"http://www.w3.org/2000/svg",
"circle"
)

end.setAttribute("cx",points[points.length-1].x)
end.setAttribute("cy",points[points.length-1].y)
end.setAttribute("r","6")
end.setAttribute("fill","green")

svg.appendChild(end)

}

function generateInstructions(points){

let steps=[]

/* conversion factor: pixels → meters */
const pixelToMeter = 0.1

for(let i=1;i<points.length;i++){

let prev=points[i-1]
let curr=points[i]

let dx=curr.x-prev.x
let dy=curr.y-prev.y

/* distance */

let distPixels = Math.sqrt(dx*dx + dy*dy)
let distMeters = Math.round(distPixels * pixelToMeter)

/* direction */

let direction=""

if(Math.abs(dx)>Math.abs(dy)){

if(dx>0){
direction="Walk right"
}else{
direction="Walk left"
}

}else{

if(dy>0){
direction="Walk straight"
}else{
direction="Walk upward"
}

}

/* instruction */

steps.push(direction+" "+distMeters+" meters")

/* check if this point is a landmark */

let nodeName = Object.keys(nodes).find(
key => nodes[key].x === curr.x && nodes[key].y === curr.y
)

if(nodeName && landmarks[nodeName]){

steps.push("📍 Reach " + landmarks[nodeName])

}

}

/* destination message */

steps.push("🎯 Destination ahead")

return steps

}

/* ---------------- NAVIGATION ---------------- */

function navigate(){

let dest=document.getElementById("destination").value
let text=""

let block=params.get("block")

/* if user clicked map use that location */

if(currentLocation){

let dest=document.getElementById("destination").value

let destinationNode=""

if(dest==="Ticket Counter") destinationNode="ticket"
if(dest==="Parking") destinationNode="parking"
if(dest==="Platform 1") destinationNode="toilet"
if(dest==="Platform 2") destinationNode="toilet"

let points=[currentLocation,nodes[destinationNode]]

drawRoute(points)

/* GENERATE INSTRUCTIONS */

let steps = generateInstructions(points)

let html=""

steps.forEach((s,i)=>{
html += (i+1)+". "+s+"<br>"
})

document.getElementById("result").innerHTML = html

return
}

if(!block){
block="A"
}

let destinationNode=""

if(dest==="Ticket Counter") destinationNode="ticket"
if(dest==="Parking") destinationNode="parking"
if(dest==="Platform 1") destinationNode="toilet"
if(dest==="Platform 2") destinationNode="toilet"

let path=shortestPath(block,destinationNode)

let points=pathToPoints(path)

drawRoute(points)

/* GENERATE INSTRUCTIONS */

let steps = generateInstructions(points)

let html=""

steps.forEach((s,i)=>{
html += (i+1)+". "+s+"<br>"
})

document.getElementById("result").innerHTML = html
}

/* ---------------- BLOCK POSITIONS ---------------- */

const blockPositions = {

A:{top:"200px",left:"150px"},
B:{top:"220px",left:"420px"},
C:{top:"380px",left:"160px"},
D:{top:"390px",left:"430px"}

}

/* ---------------- QR BLOCK LOCATION ---------------- */

const params = new URLSearchParams(window.location.search)
/* ---------------- MAP CLICK LOCATION ---------------- */

let currentLocation = null

const map = document.getElementById("mapContainer")

map.addEventListener("click",function(e){

const rect = map.getBoundingClientRect()

let x = e.clientX - rect.left
let y = e.clientY - rect.top

currentLocation = {x:x,y:y}

const marker=document.getElementById("marker")

marker.style.display="block"
marker.style.left = x + "px"
marker.style.top = y + "px"

document.getElementById("location").innerHTML =
"📍 Custom location selected"

})

const block=params.get("block")

if(block && blockPositions[block]){

document.getElementById("location").innerHTML=
"📍 You are at Block "+block

const marker=document.getElementById("marker")

marker.style.display="block"
marker.style.top=blockPositions[block].top
marker.style.left=blockPositions[block].left

}

/* ---------------- LOAD AMENITIES ---------------- */

async function loadAmenities(){

let res=await fetch("../data/amenities.json")
let data=await res.json()

let amenities=data["PUVM"]

let map=document.getElementById("mapContainer")

amenities.forEach(a=>{

let icon=document.createElement("div")
icon.className="amenity"
icon.id=a.id
icon.innerHTML=a.icon

icon.style.left=a.x+"px"
icon.style.top=a.y+"px"

let tooltip=document.createElement("div")
tooltip.className="tooltip"
tooltip.innerText=a.name

icon.appendChild(tooltip)

icon.addEventListener("mouseenter",()=>{
tooltip.style.display="block"
})

icon.addEventListener("mouseleave",()=>{
tooltip.style.display="none"
})

map.appendChild(icon)

})

const amenity=params.get("amenity")

if(amenity){

let el=document.getElementById(amenity)

if(el){

el.classList.add("highlight")

el.scrollIntoView({
behavior:"smooth",
block:"center"
})

}

}

}

loadAmenities()

</script>

</body>

</html>
