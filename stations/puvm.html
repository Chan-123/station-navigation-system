<!DOCTYPE html>
<html>

<head>

<title>Puzhuthivakkam MRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.map-container{
position:relative;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.station-map{
width:100%;
border-radius:10px;
}

.route-layer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.marker{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
display:none;
}

.recommended{
position:absolute;
width:30px;
height:30px;
border:3px solid lime;
border-radius:50%;
}

.location{
margin-top:10px;
font-weight:500;
background:#e8f3ff;
padding:8px;
border-radius:6px;
}

.controls{
margin-top:20px;
}

select{
padding:10px;
width:220px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}

button:hover{
background:#1e6fb9;
}

.result{
margin-top:15px;
font-weight:500;
}

</style>

</head>

<body>

<header>

<h2>Puzhuthivakkam MRTS Station</h2>
<p>Station Code: PUVM</p>

</header>

<div class="container">

<div class="map-container">

<img src="../maps/puvm-map.png" class="station-map">

<!-- SVG ROUTE LAYER -->
<svg id="routeLayer" class="route-layer"></svg>

<!-- current location marker -->
<div id="marker" class="marker"></div>

<!-- recommended entry blocks -->
<div class="recommended" style="top:360px; left:720px;"></div> <!-- Block A -->
<div class="recommended" style="top:200px; left:260px;"></div> <!-- Block C -->

<p id="location" class="location"></p>

</div>

<div class="controls">

<h3>Select Destination</h3>

<select id="destination">

<option value="Platform 1">Platform 1</option>
<option value="Platform 2">Platform 2</option>
<option value="Parking">Parking</option>
<option value="Ticket Counter">Ticket Counter</option>

</select>

<button onclick="navigate()">Navigate</button>

<p id="result" class="result"></p>

</div>

</div>

<script>

/* Navigation instructions */

function navigate(){

let dest = document.getElementById("destination").value

let text=""

if(dest=="Platform 1"){
text="➡ Walk towards staircase and reach Platform 1"
}

if(dest=="Platform 2"){
text="➡ Use FOB and reach Platform 2"
}

if(dest=="Parking"){
text="➡ Exit towards Block C parking area"
}

if(dest=="Ticket Counter"){
text="➡ Ticket counter available near Block A entrance"
}

document.getElementById("result").innerHTML=text

}

/* Block positions on map */

const blockPositions = {

A:{top:"200px",left:"150px"},
B:{top:"220px",left:"420px"},
C:{top:"380px",left:"160px"},
D:{top:"390px",left:"430px"}

}

/* Detect QR block */

const params = new URLSearchParams(window.location.search)

const block = params.get("block")

if(block){

document.getElementById("location").innerHTML =
"📍 You are at Block " + block

const marker=document.getElementById("marker")

marker.style.display="block"

marker.style.top=blockPositions[block].top
marker.style.left=blockPositions[block].left

}

async function loadAmenities(){

let res = await fetch("../data/amenities.json")

let data = await res.json()

let amenities = data["PUVM"]

amenities.forEach(a=>{

let icon=document.createElement("div")

icon.innerHTML=a.icon

icon.style.position="absolute"
icon.style.left=a.x+"px"
icon.style.top=a.y+"px"
icon.style.fontSize="20px"

document.querySelector(".map-container").appendChild(icon)

})

}

loadAmenities()

</script>

</body>

</html>
