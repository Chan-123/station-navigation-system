<!DOCTYPE html>
<html>

<head>

<title>Adambakkam MRTS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.map-container{
position:relative;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.station-map{
width:100%;
border-radius:10px;
}

.marker{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
display:none;
}

.recommended{
position:absolute;
width:30px;
height:30px;
border:3px solid lime;
border-radius:50%;
}

.block{
position:absolute;
width:40px;
height:40px;
cursor:pointer;
}

.route{
position:absolute;
height:4px;
background:red;
display:none;
}

.icon{
position:absolute;
font-size:20px;
}

.location{
margin-top:10px;
font-weight:500;
background:#e8f3ff;
padding:8px;
border-radius:6px;
}

.controls{
margin-top:20px;
}

select{
padding:10px;
width:220px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f4c81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}

button:hover{
background:#1e6fb9;
}

.result{
margin-top:15px;
font-weight:500;
}

</style>

</head>

<body>

<header>

<h2>Adambakkam MRTS Station</h2>
<p>Station Code: ADBM</p>

</header>

<div class="container">

<div class="map-container">

<img id="mapImage" src="../maps/ADBM BLOCK C Ground floor.PNG" class="station-map">

<!-- current location marker -->
<div id="marker" class="marker"></div>

<!-- recommended blocks C and D -->
<div class="recommended" style="top:200px; left:420px;"></div>
<div class="recommended" style="top:380px; left:420px;"></div>

<!-- clickable blocks -->
<div class="block" style="top:200px; left:150px;" onclick="selectBlock('A')"></div>
<div class="block" style="top:200px; left:420px;" onclick="selectBlock('B')"></div>
<div class="block" style="top:380px; left:150px;" onclick="selectBlock('C')"></div>
<div class="block" style="top:380px; left:420px;" onclick="selectBlock('D')"></div>

<!-- route line -->
<div id="routeLine" class="route"></div>

<!-- amenity icons -->
<div class="icon" style="top:230px; left:430px;">🚻</div>
<div class="icon" style="top:390px; left:430px;">🎫</div>
<div class="icon" style="top:220px; left:160px;">🛗</div>

<div id="location" class="location"></div>

</div>

<div class="controls">

<h3>Select Destination</h3>

<select id="destination">

<option value="Platform 1">Platform 1 (Towards Velachery)</option>
<option value="Platform 2">Platform 2 (Towards St Thomas Mount)</option>
<option value="Ticket Counter">Ticket Counter</option>
<option value="Parking">Parking</option>
<option value="Lift">Lift</option>
<option value="Escalator">Escalator</option>
<option value="Toilet">Toilet</option>

</select>

<option value="Platform 1">Platform 1</option>
<option value="Platform 2">Platform 2</option>
<option value="Parking">Parking</option>
<option value="Ticket Counter">Ticket Counter</option>

</select>

<button onclick="navigate()">Navigate</button>

<p id="result" class="result"></p>

</div>

</div>

<script>

/* floor switching */

function showFloor(floor){

let map=document.getElementById("mapImage")

if(floor==0){
map.src="../maps/ADBM BLOCK C Ground floor.PNG"
}

if(floor==1){
map.src="../maps/ADBM BLOCK C Ground floor to First floor.PNG"
}

if(floor==2){
map.src="../maps/ADBM BLOCK C Second floor Platform.PNG"
}

}

/* block coordinates */

const blockPositions = {

A:{top:"200px",left:"150px"},
B:{top:"200px",left:"420px"},
C:{top:"380px",left:"150px"},
D:{top:"380px",left:"420px"}

}

/* clickable block */

function selectBlock(b){

document.getElementById("location").innerHTML =
"📍 Selected Block "+b

}

/* navigation logic */

function navigate(){

let dest=document.getElementById("destination").value
let block=new URLSearchParams(window.location.search).get("block")

let text=""

if(dest=="Platform 1"){

showFloor(2)

text="➡ Take stairs/escalator to platform level and go to Platform 1 (Towards Velachery)"

}

if(dest=="Platform 2"){

showFloor(2)

text="➡ Take stairs/escalator to platform level and go to Platform 2 (Towards St Thomas Mount)"

}

if(dest=="Lift"){
text="➡ Lift available near Block C staircase"
}

if(dest=="Escalator"){
text="➡ Escalator available near Block C platform access"
}

if(dest=="Toilet"){
text="➡ Toilet available near Block B area"
}

document.getElementById("result").innerHTML=text

drawRoute()

}

/* draw route line */

function drawRoute(){

let line=document.getElementById("routeLine")

line.style.display="block"

let dest=document.getElementById("destination").value

if(dest=="Platform 1" || dest=="Platform 2"){

showFloor(2)

line.style.top="220px"
line.style.left="150px"
line.style.width="400px"

}
else{

showFloor(0)

line.style.top="300px"
line.style.left="150px"
line.style.width="280px"

}

}

/* QR block detection */

const params=new URLSearchParams(window.location.search)

const block=params.get("block")

if(block){

document.getElementById("location").innerHTML=
"📍 You are at Block "+block

const marker=document.getElementById("marker")

marker.style.display="block"

marker.style.top=blockPositions[block].top
marker.style.left=blockPositions[block].left

}

</script>

</body>

</html>
