<!DOCTYPE html>
<html>

<head>

<title>QR Code Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.station{
margin-top:30px;
}

.qr-grid{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
margin-top:20px;
}

.qr-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
width:150px;
}

.qr-card p{
font-size:13px;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<h2>Station Amenity QR Generator</h2>

</header>

<div class="container" id="qrContainer"></div>

<script>

async function generateQR(){

let res = await fetch("data/amenities.json")

let data = await res.json()

let container = document.getElementById("qrContainer")

Object.keys(data).forEach(station =>{

let stationDiv=document.createElement("div")

stationDiv.className="station"

stationDiv.innerHTML="<h3>"+station+" Station</h3>"

let grid=document.createElement("div")

grid.className="qr-grid"

data[station].forEach(amenity=>{

let card=document.createElement("div")

card.className="qr-card"

let qrDiv=document.createElement("div")

let text="stations/"+station.toLowerCase()+".html?amenity="+amenity.id

new QRCode(qrDiv,{
text:window.location.origin+"/"+text,
width:120,
height:120
})

let label=document.createElement("p")

label.innerText=amenity.name

card.appendChild(qrDiv)

card.appendChild(label)

grid.appendChild(card)

})

stationDiv.appendChild(grid)

container.appendChild(stationDiv)

})

}

generateQR()

</script>

</body>

</html>
