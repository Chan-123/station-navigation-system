<!DOCTYPE html>
<html>

<head>

<title>QR Code Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.station{
margin-top:30px;
display:flex;
justify-content:center;
}

.qr-grid{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
margin-top:20px;
}

.qr-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
width:150px;
}

.download-btn{
margin-top:8px;
padding:6px 10px;
background:#0f4c81;
color:white;
border:none;
border-radius:5px;
font-size:12px;
cursor:pointer;
}

.download-btn:hover{
background:#1e6fb9;
}

.qr-card p{
font-size:13px;
margin-top:8px;
}

</style>

</head>

<body>

<header>

<h2>Station Amenity QR Generator</h2>

</header>

<div class="container" id="qrContainer"></div>

<script>

async function generateQR(){

let res = await fetch("data/amenities.json")
let data = await res.json()

let container = document.getElementById("qrContainer")

/* CREATE ONE GRID FOR ALL STATIONS */

let grid=document.createElement("div")
grid.className="qr-grid"

async function generateQR(){

let res = await fetch("data/amenities.json")
let data = await res.json()

let container = document.getElementById("qrContainer")

let grid=document.createElement("div")
grid.className="qr-grid"

Object.keys(data).forEach(station =>{

data[station].forEach(a=>{

let card=document.createElement("div")
card.className="qr-card"

let qrDiv=document.createElement("div")

let text="stations/"+station.toLowerCase()+".html?amenity="+a.id

new QRCode(qrDiv,{
text:window.location.origin+"/station-navigation-system/"+text,
width:150,
height:150
})

let label=document.createElement("p")
label.innerText=station+" - "+a.name

let btn=document.createElement("button")
btn.innerText="Download PDF"
btn.className="download-btn"

btn.onclick=function(){
downloadQR(qrDiv,station,a)
}

card.appendChild(qrDiv)
card.appendChild(label)
card.appendChild(btn)

grid.appendChild(card)

})

})

container.appendChild(grid)

}

generateQR()

container.appendChild(grid)

}

generateQR()
async function downloadQR(qrDiv,station,amenity){

const { jsPDF } = window.jspdf

let canvas = qrDiv.querySelector("canvas")
let qrImage = canvas.toDataURL("image/png")

let pdf = new jsPDF("p","mm","a4")

let width = 210
let height = 297

/* BORDER */

pdf.setLineWidth(3)
pdf.rect(10,10,width-20,height-20)

/* LOAD LOGO */

let img = new Image()
img.src = "images/railway-logo.png"

img.onload = function(){

pdf.addImage(img,"PNG",90,15,30,30)

/* HEADINGS */

pdf.setFont("helvetica","bold")

pdf.setFontSize(20)
pdf.text("SOUTHERN RAILWAY",105,55,{align:"center"})

pdf.setFontSize(16)
pdf.text("CHENNAI DIVISION",105,65,{align:"center"})

pdf.setFontSize(14)
pdf.text(station+" MRTS STATION",105,80,{align:"center"})

/* AMENITY */

pdf.setFontSize(16)
pdf.text(amenity.name.toUpperCase(),105,95,{align:"center"})

/* LOCATION */

pdf.setFont("helvetica","normal")

pdf.setFontSize(12)

let locationText =
"Scan the QR Code to navigate to station amenities inside "+station+" MRTS Station."

pdf.text(locationText,105,110,{align:"center",maxWidth:160})

/* QR CODE */

pdf.addImage(qrImage,"PNG",65,130,80,80)

/* FOOTER */

pdf.setFontSize(10)

pdf.text(
"Smart Station Navigation System • Southern Railway",
105,
230,
{align:"center"}
)

pdf.save(station+"_"+amenity.name+".pdf")

}

}
</script>

</body>

</html>
