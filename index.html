<!DOCTYPE html>
<html>

<head>

<title>Smart Station Navigation - Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f4c81,#1e3c72);
}

/* LOGIN CARD */

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.35);
text-align:center;
width:350px;
}

/* RAILWAY LOGO */

.logo{
width:90px;
margin-bottom:10px;
}

/* HEADINGS */

h1{
margin:5px 0;
font-size:22px;
color:#0f4c81;
}

h2{
margin:2px 0 20px;
font-size:16px;
font-weight:500;
color:#444;
}

/* INPUTS */

input{
width:92%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* BUTTON */

button{
width:95%;
padding:12px;
margin-top:10px;
border:none;
background:#0f4c81;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e6fb9;
}

/* ERROR */

.error{
color:red;
font-size:14px;
margin-top:10px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="login-box">

<!-- RAILWAY LOGO -->
<img src="images/railway-logo.png" class="logo">

<h1>Southern Railway</h1>
<h2>Chennai Division</h2>

<h3>🚉 Admin Login</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="error"></p>

<div class="footer">
Smart Station Navigation System
</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){

window.location.href="dashboard.html";

}else{

document.getElementById("error").innerText="Invalid Username or Password";

}

}

</script>

</body>

</html>
