<!DOCTYPE html>
<html>

<head>

<title>Station Map Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.map-container{
position:relative;
width:900px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.station-map{
width:100%;
}

.marker{
position:absolute;
font-size:22px;
cursor:move;
transform:translate(-50%,-50%);
}

.controls{
margin-top:20px;
}

select{
padding:8px;
margin-right:10px;
}

button{
padding:8px 14px;
background:#0f4c81;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Station Map Editor</h2>

</header>

<div class="controls">

<select id="amenityType">

<option value="toilet">🚻 Toilet</option>
<option value="lift">🛗 Lift</option>
<option value="ticket">🎫 Ticket Counter</option>
<option value="parking">🅿 Parking</option>
<option value="water">💧 Drinking Water</option>

</select>

</div>

<div class="map-container" id="map">

<img src="../maps/puvm-map.png" class="station-map">

</div>

<script>

const map=document.getElementById("map")

/* CLICK MAP TO ADD AMENITY */

map.addEventListener("click",(e)=>{

const rect=map.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let type=document.getElementById("amenityType").value

let icons={
toilet:"🚻",
lift:"🛗",
ticket:"🎫",
parking:"🅿",
water:"💧"
}

createMarker(x,y,icons[type],type)

})

function createMarker(x,y,icon,type){

let marker=document.createElement("div")

marker.className="marker"
marker.innerHTML=icon

marker.style.left=x+"px"
marker.style.top=y+"px"

map.appendChild(marker)

dragElement(marker,type)

}

/* DRAG FUNCTION */

function dragElement(el,type){

let offsetX,offsetY

el.onmousedown=function(e){

offsetX=e.offsetX
offsetY=e.offsetY

document.onmousemove=function(e){

let rect=map.getBoundingClientRect()

let x=e.clientX-rect.left-offsetX
let y=e.clientY-rect.top-offsetY

el.style.left=x+"px"
el.style.top=y+"px"

console.log(type,"X:",Math.round(x),"Y:",Math.round(y))

}

document.onmouseup=function(){

document.onmousemove=null

}

}

}

</script>

</body>
</html>
