<!DOCTYPE html>
<html>

<head>

<title>Station Map Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#0f4c81;
color:white;
padding:20px;
}

.controls{
margin:20px;
}

select{
padding:8px;
margin-right:10px;
}

button{
padding:8px 14px;
background:#0f4c81;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.map-container{
position:relative;
width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.station-map{
width:100%;
}

.marker{
position:absolute;
font-size:22px;
cursor:move;
transform:translate(-50%,-50%);
}

</style>

</head>

<body>

<header>

<h2>Station Map Editor</h2>

</header>

<div class="controls">

<select id="station">

<option value="PUVM">PUVM</option>
<option value="ADBM">ADBM</option>
<option value="VLCY">VLCY</option>
<option value="STM">STM</option>

</select>

<select id="amenityType">

<option value="toilet">🚻 Toilet</option>
<option value="lift">🛗 Lift</option>
<option value="ticket">🎫 Ticket Counter</option>
<option value="parking">🅿 Parking</option>
<option value="water">💧 Drinking Water</option>

</select>

<button onclick="saveAmenities()">Save</button>

</div>

<div class="map-container" id="map">

<img src="../maps/puvm-map.png" class="station-map">

</div>

<script>

let amenities={}

const map=document.getElementById("map")

/* LOAD SAVED DATA */

function loadAmenities(){

let stored=localStorage.getItem("amenities")

if(stored){
amenities=JSON.parse(stored)
}

drawAmenities()

}

/* DRAW ICONS */

function drawAmenities(){

map.querySelectorAll(".marker").forEach(m=>m.remove())

let station=document.getElementById("station").value

if(!amenities[station]) return

amenities[station].forEach(a=>{

createMarker(a.x,a.y,a.icon,a.id)

})

}

/* CLICK MAP */

map.addEventListener("click",(e)=>{

const rect=map.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let type=document.getElementById("amenityType").value

let icons={
toilet:"🚻",
lift:"🛗",
ticket:"🎫",
parking:"🅿",
water:"💧"
}

let station=document.getElementById("station").value

if(!amenities[station]){
amenities[station]=[]
}

amenities[station].push({
id:type,
name:type,
icon:icons[type],
x:Math.round(x),
y:Math.round(y)
})

createMarker(x,y,icons[type],type)

})

/* CREATE ICON */

function createMarker(x,y,icon,type){

let marker=document.createElement("div")

marker.className="marker"
marker.innerHTML=icon

marker.style.left=x+"px"
marker.style.top=y+"px"

map.appendChild(marker)

dragElement(marker,type)

marker.onclick=function(){

if(confirm("Delete this amenity?")){

marker.remove()

}

}

}

/* DRAG ICON */

function dragElement(el,type){

let offsetX,offsetY

el.onmousedown=function(e){

offsetX=e.offsetX
offsetY=e.offsetY

document.onmousemove=function(e){

let rect=map.getBoundingClientRect()

let x=e.clientX-rect.left-offsetX
let y=e.clientY-rect.top-offsetY

el.style.left=x+"px"
el.style.top=y+"px"

}

document.onmouseup=function(){

document.onmousemove=null

}

}

}

/* SAVE */

function saveAmenities(){

localStorage.setItem("amenities",JSON.stringify(amenities))

alert("Amenities saved successfully")

}

/* SWITCH STATION */

document.getElementById("station").addEventListener("change",drawAmenities)

loadAmenities()

</script>

</body>

</html>
