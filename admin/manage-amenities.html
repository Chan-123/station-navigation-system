<!DOCTYPE html>
<html>

<head>

<title>Station Amenities Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#0f4c81,#1e3c72);
color:#333;
}

/* HEADER */

header{
text-align:center;
padding:30px;
color:white;
}

.logo{
width:80px;
margin-bottom:10px;
}

header h1{
margin:5px 0;
font-size:26px;
}

header p{
opacity:0.9;
font-size:14px;
}

/* MAIN CARD */

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* CONTROLS */

.controls{
margin-bottom:20px;
display:flex;
gap:10px;
align-items:center;
}

select{
padding:8px 12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:120px;
}

button{
padding:8px 14px;
border:none;
background:#0f4c81;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#1e6fb9;
}

/* TABLE */

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

th{
background:#0f4c81;
color:white;
padding:10px;
font-weight:500;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#f4f7fb;
}

/* DELETE BUTTON */

.delete-btn{
background:#c0392b;
}

.delete-btn:hover{
background:#e74c3c;
}

footer{
text-align:center;
margin-top:20px;
color:white;
font-size:13px;
opacity:0.8;
}

.map-editor{
margin-top:20px;
text-align:center;
}

#mapEditor{
width:100%;
max-width:700px;
border-radius:10px;
cursor:crosshair;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<header>

<img src="../images/railway-logo.png" class="logo">

<h1>Southern Railway</h1>
<p>Chennai Division</p>

<h2>Station Amenities Management</h2>

</header>

<div class="container">

<h3>Click Map to Capture Coordinates</h3>

<div class="map-editor">

<img id="mapEditor" src="../maps/puvm-map.png">

</div>

<div class="controls">

<select id="station">
<option value="PUVM">PUVM - Puzhuthivakkam</option>
<option value="ADBM">ADBM - Adambakkam</option>
<option value="VLCY">VLCY - Velachery</option>
<option value="STM">STM - St Thomas Mount</option>
</select>

<button onclick="loadAmenities()">Load Amenities</button>

<button onclick="window.open('map-editor.html')">
Open Map Editor
</button>

</div>

<hr style="margin:20px 0">

<h3>Add New Amenity</h3>

<div class="controls">

<select id="amenityName">

<option value="Ticket Counter">Ticket Counter</option>
<option value="Toilet">Toilet</option>
<option value="Escalator">Escalator</option>
<option value="Lift">Lift</option>
<option value="Staircase">Staircase</option>
<option value="Platform 1">Platform Number 1 (Towards Beach)</option>
<option value="Platform 2">Platform Number 2 (Towards St Thomas Mount)</option>

</select>

<select id="amenityIcon">

<option value="🎫">🎫 Ticket</option>
<option value="🚻">🚻 Toilet</option>
<option value="🛗">🛗 Lift</option>
<option value="⬆">⬆ Escalator</option>
<option value="🪜">🪜 Staircase</option>
<option value="🚆">🚆 Platform</option>

</select>

<input id="xCoord" type="number" placeholder="X position">

<input id="yCoord" type="number" placeholder="Y position">

<button onclick="addAmenity()">Add Amenity</button>

</div>

<table id="table">

<tr>
<th>Icon</th>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Action</th>
</tr>

</table>

</div>

<footer>
Smart Station Navigation System • Southern Railway
</footer>

<script>

let data

async function loadAmenities(){

if(!data){

/* load from localStorage first */

let saved = localStorage.getItem("stationAmenities")

if(saved){

data = JSON.parse(saved)

}else{

let res = await fetch("../data/amenities.json")
data = await res.json()

}

}

let station = document.getElementById("station").value

let table = document.getElementById("table")

table.innerHTML = `
<tr>
<th>Icon</th>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Action</th>
</tr>
`

data[station].forEach((a,i)=>{

table.innerHTML += `
<tr>
<td>${a.icon}</td>
<td>${a.name}</td>
<td>${a.x}</td>
<td>${a.y}</td>
<td>
<button class="delete-btn" onclick="deleteAmenity(${i})">
Delete
</button>
</td>
</tr>
`

})

}

function deleteAmenity(i){

let station = document.getElementById("station").value

data[station].splice(i,1)

/* update localStorage */

localStorage.setItem("stationAmenities", JSON.stringify(data))

loadAmenities()

}

function addAmenity(){

let station=document.getElementById("station").value

let name=document.getElementById("amenityName").value
let icon=document.getElementById("amenityIcon").value

let x=parseInt(document.getElementById("xCoord").value)
let y=parseInt(document.getElementById("yCoord").value)

if(!x || !y){
alert("Enter X and Y coordinates")
return
}

data[station].push({
name:name,
icon:icon,
x:x,
y:y
})

localStorage.setItem("stationAmenities", JSON.stringify(data))

loadAmenities()

loadAmenities()

}

/* capture coordinates from map click */

document.getElementById("mapEditor").addEventListener("click",function(e){

let rect=this.getBoundingClientRect()

let x=Math.round(e.clientX - rect.left)
let y=Math.round(e.clientY - rect.top)

document.getElementById("xCoord").value=x
document.getElementById("yCoord").value=y

})

document.getElementById("station").addEventListener("change",function(){

let station=this.value

let map=document.getElementById("mapEditor")

if(station=="PUVM")
map.src="../maps/puvm-map.png"

if(station=="ADBM")
map.src="../maps/ADBM BLOCK C Ground floor.PNG"

if(station=="VLCY")
map.src="../maps/vlcy-map.png"

if(station=="STM")
map.src="../maps/stm-map.png"

})
</script>

</body>

</html>
